# docker-compose.yml
# Orchestrates every service's containers together. One shared Postgres
# container hosts every service's own database - each service gets a
# dedicated, isolated database + user inside it (see database/postgres/init.sh),
# not a separate Postgres container per service.

services:

  # ----------- Shared Postgres -----------
  postgres:
    image: postgres:16-alpine
    ports:
      # Exposes the container to the host so GUI tools (pgAdmin) can inspect
      # it - not needed by any service itself, they all reach it via the
      # "postgres" hostname on the Compose network instead. Host port is 5434,
      # not 5432, because native Postgres installs on this machine already
      # occupy 5432/5433 - two servers can't bind the same host port.
      - "5434:5432"
    environment:
      # Bootstrap superuser - used only to initialize the cluster and by
      # init.sh to create each service's own database/user. No application
      # ever connects with these credentials directly.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Passed through so init.sh (running inside this same container) can
      # read them - see database/postgres/init.sh for what it does with these.
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      USER_DB_NAME: ${USER_DB_NAME}
      USER_DB_USER: ${USER_DB_USER}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD}
    volumes:
      # Named volume: data survives container restarts/rebuilds.
      - postgres-data:/var/lib/postgresql/data
      # Runs automatically, once, only if the volume above is empty.
      - ./database/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------- auth-service -----------
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      # DB_HOST is the shared postgres service's name above - Compose lets
      # containers reach each other using the other service's name as a
      # hostname. DB_NAME/DB_USERNAME/DB_PASSWORD are auth-service's own
      # dedicated credentials (created by init.sh), not the bootstrap superuser.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${AUTH_DB_NAME}
      DB_USERNAME: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      postgres:
        # Waits for the healthcheck above to actually pass, not just for the
        # container to start - Postgres takes a moment to become ready.
        condition: service_healthy

  # ----------- user-service -----------
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      # Same shared postgres container as auth-service, own dedicated database.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${USER_DB_NAME}
      DB_USERNAME: ${USER_DB_USER}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      # Same secret as auth-service - this service only validates tokens,
      # never issues its own.
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
