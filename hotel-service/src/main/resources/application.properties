# application.properties
# Runtime configuration for Hotel Service: app identity, Postgres connection,
# and JWT settings. All secrets/credentials below have local-dev fallbacks
# via ${VAR:default} - real environments must override them through actual
# environment variables, never by editing the fallback here.

spring.application.name=hotel-service

# Fixed per-service port - auth-service is 8081, user-service is 8082, this
# is the next one, so running multiple services natively/side by side never
# collides.
server.port=${SERVER_PORT:8083}

# Loads .env (KEY=VALUE, properties-format) into Spring's Environment so the
# ${VAR:default} placeholders below pick up real local values.
spring.config.import=optional:file:.env[.properties]

# --- Datasource (Postgres) ---
# These values will be fed to the DataSource bean at startup, once the bean
# is built the real TCP connection to Postgres is established.
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:hotel_service_db}
spring.datasource.username=${DB_USERNAME:hotel_service}
spring.datasource.password=${DB_PASSWORD:hotel_service}

# --- JPA / Hibernate ---
# validate: Hibernate only checks the entities match the real schema on
# startup - it never creates/alters tables itself. Flyway (db/migration/*.sql)
# owns the schema instead.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ----------------- CUSTOM APPLICATION PROPERTIES -----------------
# --- JWT ---
# Must be the EXACT SAME secret as auth-service's app.jwt.secret - this
# service only ever validates tokens auth-service issues, it never signs its
# own. A mismatched secret here would reject every otherwise-valid token.
app.jwt.secret=${JWT_SECRET:hotel-service-dev-fallback-secret-please-override-me}
