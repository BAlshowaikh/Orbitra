# application.properties
# This file is the actual file for auth-service that will consume the real environment variables. It is not a template, and it is not meant to be edited directly.
# Runtime configuration for Auth Service: app identity, Postgres connection, and JWT settings.
# All secrets/credentials below have local-dev fallbacks via ${VAR:default} — real environments
# must override them through actual environment variables, never by editing the fallback here.

# ------ Notes:
# The ${VAR:default} syntax on several lines — that's Spring's 
# property-placeholder syntax: "read the environment variable VAR; 
# if it isn't set, fall back to default." So locally, with no env vars set, 
# the app runs using the fallback values shown (auth_service/auth_service, the dev JWT secret). 
# In a real deployment you'd set real DB_PASSWORD/JWT_SECRET env vars on the server, and these fallbacks are never touched 
# — meaning no real secret ever needs to live in this committed file.

spring.application.name=auth-service

# Loads .env (KEY=VALUE, properties-format) into Spring's Environment so the ${VAR:default}
# placeholders below actually pick up real local values - without this, Spring Boot never
# reads .env on its own, and every placeholder would silently use its fallback instead.
spring.config.import=optional:file:.env[.properties]

# --- Datasource (Postgres) ---
# Points at a dedicated auth_service role/database on your local native Postgres 18 instance
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/${DB_NAME:auth_service_db}
spring.datasource.username=${DB_USERNAME:auth_service}
spring.datasource.password=${DB_PASSWORD:auth_service}

# --- JPA / Hibernate ---
# update means: on startup, Hibernate looks at your @Entity classes (Account) and creates/alters tables to match. 
# debugging toggle (prints the SQL Hibernate generates to the console).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ----------------- CUSTOM APPLICATION PROPERTIES (Not provided by springboot) -----------------
# --- JWT ---
# HS256 requires a secret >= 256 bits (32 chars); the fallback below is long enough for dev only
app.jwt.secret=${JWT_SECRET:auth-service-dev-fallback-secret-please-override-me}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
